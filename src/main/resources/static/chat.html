<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Matrimony Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .main-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation */
    .top-nav {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding: 12px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      z-index: 1000;
    }

    .nav-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1400px;
      margin: 0 auto;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand::before {
      content: "💬";
      font-size: 24px;
      -webkit-text-fill-color: initial;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-name {
      font-weight: 600;
      color: #1a1a1a;
      font-size: 14px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .status-badge.connected {
      background: #d4f4dd;
      color: #0d7a2a;
    }

    .status-badge.disconnected {
      background: #ffd6d6;
      color: #d32f2f;
    }

    .logout-btn {
      background: #f5f5f5;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 13px;
      color: #d32f2f;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: #ffd6d6;
      transform: translateY(-1px);
    }

    /* Chat Container */
    .chat-container {
      display: flex;
      max-width: 1400px;
      width: 100%;
      margin: 20px auto;
      height: calc(100vh - 100px);
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    /* Sidebar */
    .sidebar {
      width: 380px;
      background: #f8f9fa;
      border-right: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #e9ecef;
    }

    .sidebar-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0 0 8px 0;
    }

    .search-box {
      position: relative;
      margin-top: 12px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1px solid #e9ecef;
      border-radius: 24px;
      font-size: 14px;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .search-box input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
    }

    .connections-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .connections-list::-webkit-scrollbar {
      width: 6px;
    }

    .connections-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .connections-list::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 10px;
    }

    .connection-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      margin-bottom: 4px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .connection-item:hover {
      background: rgba(102, 126, 234, 0.08);
      transform: translateX(4px);
    }

    .connection-item.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .connection-item.active .connection-name,
    .connection-item.active .connection-username {
      color: white !important;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      font-size: 18px;
      margin-right: 12px;
      flex-shrink: 0;
      position: relative;
    }

    .connection-item.active .avatar {
      background: white;
      color: #667eea;
    }

    .online-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
      border: 2px solid white;
      position: absolute;
      bottom: 2px;
      right: 2px;
    }

    .offline-indicator {
      background: #94a3b8;
    }

    .connection-info {
      flex: 1;
      min-width: 0;
    }

    .connection-name {
      font-weight: 600;
      font-size: 15px;
      color: #1a1a1a;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .connection-username {
      font-size: 13px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: #ef4444;
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .connection-item.active .unread-badge {
      background: white;
      color: #667eea;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .chat-header {
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      font-size: 16px;
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-name {
      font-weight: 600;
      font-size: 16px;
      color: #1a1a1a;
      margin: 0;
    }

    .chat-header-username {
      font-size: 13px;
      color: #64748b;
      margin: 0;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: linear-gradient(to bottom, #f8f9fa 0%, #ffffff 100%);
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 10px;
    }

    .message {
      display: flex;
      margin-bottom: 16px;
      animation: messageSlide 0.3s ease;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 60%;
      padding: 12px 16px;
      border-radius: 18px;
      position: relative;
      word-wrap: break-word;
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .message.received .message-bubble {
      background: #f1f3f5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .message-sender {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
      color: #667eea;
    }

    .message-content {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .message-time {
      font-size: 11px;
      opacity: 0.7;
      text-align: right;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: 13px;
      color: #64748b;
      font-style: italic;
      background: #f8f9fa;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #667eea;
      animation: typing 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    .message-input-area {
      padding: 16px 24px;
      background: white;
      border-top: 1px solid #e9ecef;
    }

    .message-input-container {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .message-input {
      flex: 1;
      padding: 12px 20px;
      border: 2px solid #e9ecef;
      border-radius: 24px;
      font-size: 14px;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .message-input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.1) rotate(15deg);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      text-align: center;
      padding: 40px;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #64748b;
    }

    .empty-state-text {
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        display: none;
      }
      
      .sidebar.mobile-show {
        display: flex;
      }
      
      .chat-area {
        display: none;
      }
      
      .chat-area.mobile-show {
        display: flex;
      }
      
      .chat-container {
        margin: 0;
        border-radius: 0;
        height: calc(100vh - 60px);
      }
    }
  </style>
</head>
<body>
<div class="main-container">
  <div class="top-nav">
    <div class="nav-content">
      <div class="brand">Matrimony Chat</div>
      <div class="user-info">
        <span id="currentUser" class="user-name"></span>
        <span id="connectionStatus" class="status-badge disconnected">Disconnected</span>
        <button id="btnLogout" class="logout-btn">Logout</button>
      </div>
    </div>
  </div>

  <div class="chat-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 class="sidebar-title">Messages</h2>
          <span id="unreadCount" class="unread-badge" style="display: none;">0</span>
        </div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search conversations...">
        </div>
      </div>
      <div id="connections" class="connections-list">
        <div class="empty-state" style="padding: 40px 20px;">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-title">Loading...</div>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div id="chatHeader" style="display: none;" class="chat-header">
        <div class="chat-header-avatar" id="chatHeaderAvatar">U</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatHeaderName">Select a user</div>
          <div class="chat-header-username" id="chatHeaderUsername"></div>
        </div>
      </div>

      <div id="messages" class="messages-container">
        <div class="empty-state">
          <div class="empty-state-icon">💌</div>
          <div class="empty-state-title">Your messages</div>
          <div class="empty-state-text">Select a conversation to start messaging</div>
        </div>
      </div>

      <div id="typingIndicator" class="typing-indicator" style="display: none;">
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span id="typingText">Someone is typing...</span>
      </div>

      <div class="message-input-area" id="messageInputArea" style="display: none;">
        <div class="message-input-container">
          <input id="messageInput" type="text" class="message-input" placeholder="Type a message..." disabled>
          <button id="sendBtn" class="send-btn" disabled>➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
let stompClient = null;
let me = null;
let activeChatUserId = null;
let token = null;
let unreadMessages = new Map();
let activeConnectionElement = null;
let typingTimer = null;
let reconnectAttempts = 0;
const MAX_RECONNECT_ATTEMPTS = 5;
let processedMessageIds = new Set();

function getToken() {
  token = localStorage.getItem('jwtToken');
  if (!token) {
    token = prompt('Please enter your JWT token:');
    if (token) {
      localStorage.setItem('jwtToken', token);
    }
  }
  return token;
}

function parseJwt(token) {
  try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
  } catch (e) {
    console.error('Invalid token:', e);
    return null;
  }
}

function loadCurrentUser() {
  const token = getToken();
  if (!token) {
    alert('No token found. Please login first.');
    return;
  }

  const decoded = parseJwt(token);
  if (decoded) {
    me = {
      id: decoded.id,
      username: decoded.sub,
      email: decoded.email
    };
    document.getElementById('currentUser').textContent = me.username;
    document.title = `Matrimony Chat - ${me.username}`;
    console.log('Current user loaded:', me);
  } else {
    alert('Invalid token. Please login again.');
    localStorage.removeItem('jwtToken');
  }
}

function updateConnectionStatus(status, isConnected) {
  const statusEl = document.getElementById('connectionStatus');
  statusEl.textContent = status;
  statusEl.className = `status-badge ${isConnected ? 'connected' : 'disconnected'}`;
}

function connectWs() {
  try {
    const socket = new SockJS('http://10.11.177.197:9099/ws');
    stompClient = Stomp.over(socket);
    
    stompClient.debug = function(str) {
      console.log('STOMP:', str);
    };
    
    const headers = {};
    if (token) {
      headers['Authorization'] = 'Bearer ' + token;
    }

    updateConnectionStatus('Connecting...', false);

    stompClient.connect(headers, function(frame) {
      console.log('✅ Connected to WebSocket:', frame);
      updateConnectionStatus('Connected', true);
      reconnectAttempts = 0;
      
      stompClient.subscribe('/topic/user/' + me.id, function(message) {
        console.log('📨 Message received via /topic/user/' + me.id);
        try {
          const payload = JSON.parse(message.body);
          handleIncomingMessage(payload);
        } catch (e) {
          console.error('❌ Error parsing message:', e);
        }
      });

      stompClient.subscribe('/topic/typing/' + me.id, function(message) {
        try {
          const payload = JSON.parse(message.body);
          handleTypingIndicator(payload);
        } catch (e) {
          console.error('❌ Error parsing typing indicator:', e);
        }
      });

      console.log('📡 Subscribed to channels');

      loadConnections();
      loadUnreadCount();
      
    }, function(error) {
      console.error('❌ WebSocket connection error:', error);
      updateConnectionStatus('Disconnected', false);
      
      if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
        reconnectAttempts++;
        const delay = Math.min(1000 * reconnectAttempts, 10000);
        console.log(`🔄 Reconnecting in ${delay}ms...`);
        setTimeout(connectWs, delay);
      } else {
        alert('Failed to connect. Please refresh.');
      }
    });
  } catch (error) {
    console.error('❌ Error creating WebSocket:', error);
    updateConnectionStatus('Error', false);
  }
}

function handleIncomingMessage(payload) {
  console.log('🔍 Processing incoming message:', payload);
  
  if (!payload.senderId || !payload.content) {
    console.error('❌ Invalid message format:', payload);
    return;
  }
  
  if (payload.id && processedMessageIds.has(payload.id)) {
    console.log('⏭️ Message already processed, skipping duplicate');
    return;
  }
  
  if (payload.id) {
    processedMessageIds.add(payload.id);
    setTimeout(() => processedMessageIds.delete(payload.id), 60000);
  }
  
  const isSentByMe = payload.senderId === me.id;
  
  if (isSentByMe) {
    console.log('⏭️ Ignoring echo of own sent message');
    return;
  }
  
  const otherUserId = payload.senderId;
  
  if (activeChatUserId && activeChatUserId === otherUserId) {
    console.log('✅ Displaying received message in active chat');
    appendMessage(payload);
    
    if (payload.id) {
      markAsRead(payload.id);
    }
  } else {
    console.log('📬 Message for inactive chat');
    incrementUnreadCount(otherUserId);
    showNotification(payload);
  }
  
  updateConnectionList();
}

function handleTypingIndicator(payload) {
  if (payload.senderId === activeChatUserId) {
    if (payload.type === 'TYPING_START') {
      showTypingIndicator(payload.senderName || 'User');
    } else if (payload.type === 'TYPING_STOP') {
      hideTypingIndicator();
    }
  }
}

function showTypingIndicator(senderName) {
  const indicator = document.getElementById('typingIndicator');
  document.getElementById('typingText').textContent = `${senderName} is typing...`;
  indicator.style.display = 'flex';
}

function hideTypingIndicator() {
  document.getElementById('typingIndicator').style.display = 'none';
}

function sendTypingIndicator(isTyping) {
  if (!stompClient || !stompClient.connected || !activeChatUserId) return;
  
  const payload = {
    receiverId: activeChatUserId,
    type: isTyping ? 'TYPING_START' : 'TYPING_STOP',
    senderId: me.id,
    senderName: me.username,
    token: 'Bearer ' + token
  };
  
  stompClient.send('/app/chat.typing', {}, JSON.stringify(payload));
}

function showNotification(message) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(`New message from ${message.senderName || 'User'}`, {
      body: message.content,
      icon: '/favicon.ico'
    });
  }
}

if ('Notification' in window) {
  Notification.requestPermission();
}

function getInitials(name) {
  if (!name) return '?';
  const parts = name.split(' ');
  if (parts.length >= 2) {
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }
  return name.substring(0, 2).toUpperCase();
}

function appendMessage(payload) {
  const messagesDiv = document.getElementById('messages');
  
  if (messagesDiv.querySelector('.empty-state')) {
    messagesDiv.innerHTML = '';
  }

  const el = document.createElement('div');
  const timestamp = payload.sentAt ? new Date(payload.sentAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  
  if (payload.senderId === me.id) {
    el.className = 'message sent';
    el.innerHTML = `
      <div class="message-bubble">
        <div class="message-content">${escapeHtml(payload.content)}</div>
        <div class="message-time">${timestamp}</div>
      </div>
    `;
  } else {
    el.className = 'message received';
    el.innerHTML = `
      <div class="message-bubble">
        <div class="message-sender">${escapeHtml(payload.senderName || 'User')}</div>
        <div class="message-content">${escapeHtml(payload.content)}</div>
        <div class="message-time">${timestamp}</div>
      </div>
    `;
  }
  messagesDiv.appendChild(el);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function markAsRead(messageId) {
  try {
    await fetch(`http://10.11.177.197:9099/api/messages/${messageId}/read`, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      }
    });
  } catch (error) {
    console.error('Error marking message as read:', error);
  }
}

function sendMessage() {
  const textEl = document.getElementById('messageInput');
  const text = textEl.value.trim();
  if (!text || !activeChatUserId) return;

  sendTypingIndicator(false);

  const payload = {
    receiverId: activeChatUserId,
    content: text,
    messageType: 'TEXT',
    token: 'Bearer ' + token
  };

  if (stompClient && stompClient.connected) {
    stompClient.send('/app/chat.sendMessage', {}, JSON.stringify(payload));
    
    const tempMessage = {
      senderId: me.id,
      senderName: me.username,
      content: text,
      sentAt: new Date().toISOString(),
      isTemporary: true
    };
    appendMessage(tempMessage);
    
    textEl.value = '';
  } else {
    alert('WebSocket not connected. Please refresh.');
  }
}

async function loadConnections() {
	  try {
	    const response = await fetch('http://10.11.177.197:9099/api/messages/conversations/users', {
	      headers: {
	        'Authorization': 'Bearer ' + token,
	        'Content-Type': 'application/json'
	      }
	    });

	    if (response.ok) {
	      const data = await response.json();
	      // Access the payload array from the response
	      const connections = data.payload || [];
	      displayConnections(connections);
	    } else {
	      displayDummyConnections();
	    }
	  } catch (error) {
	    console.error('Error loading connections:', error);
	    displayDummyConnections();
	  }
	}


function displayConnections(users) {
  const connectionsDiv = document.getElementById('connections');
  
  if (!users || users.length === 0) {
    connectionsDiv.innerHTML = `
      <div class="empty-state" style="padding: 40px 20px;">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-title">No conversations yet</div>
        <div class="empty-state-text">Start chatting with your connections</div>
      </div>
    `;
    return;
  }

  connectionsDiv.innerHTML = users.map(user => {
    const unreadCount = unreadMessages.get(user.id) || 0;
    const displayName = user.firstName ? `${user.firstName} ${user.lastName || ''}`.trim() : user.username;
    const initials = getInitials(displayName);
    const isOnline = Math.random() > 0.5; // Demo only
    
    return `
      <div class="connection-item" onclick="setActiveChat(${user.id}, '${user.username}', '${displayName}', this)">
        <div class="avatar">
          ${initials}
          <div class="online-indicator ${isOnline ? '' : 'offline-indicator'}"></div>
        </div>
        <div class="connection-info">
          <div class="connection-name">${displayName}</div>
          <div class="connection-username">@${user.username}</div>
        </div>
        ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
      </div>
    `;
  }).join('');
}

function displayDummyConnections() {
  const connectionsDiv = document.getElementById('connections');
  connectionsDiv.innerHTML = `
    <div class="connection-item" onclick="setActiveChat(2, 'aniket', 'Aniket', this)">
      <div class="avatar">
        AN
        <div class="online-indicator"></div>
      </div>
      <div class="connection-info">
        <div class="connection-name">Aniket</div>
        <div class="connection-username">@aniket</div>
      </div>
    </div>
    <div class="connection-item" onclick="setActiveChat(3, 'tanu', 'Tanu', this)">
      <div class="avatar">
        TA
        <div class="online-indicator offline-indicator"></div>
      </div>
      <div class="connection-info">
        <div class="connection-name">Tanu</div>
        <div class="connection-username">@tanu</div>
      </div>
    </div>
  `;
}

async function setActiveChat(userId, username, displayName, clickedElement) {
  activeChatUserId = userId;
  
  const initials = getInitials(displayName);
  document.getElementById('chatHeaderAvatar').textContent = initials;
  document.getElementById('chatHeaderName').textContent = displayName;
  document.getElementById('chatHeaderUsername').textContent = `@${username}`;
  document.getElementById('chatHeader').style.display = 'flex';
  
  document.getElementById('messageInputArea').style.display = 'block';
  document.getElementById('messageInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('messageInput').focus();
  
  document.getElementById('messages').innerHTML = `
    <div class="empty-state">
      <div class="empty-state-icon">⏳</div>
      <div class="empty-state-title">Loading messages...</div>
    </div>
  `;
  
  clearUnreadCount(userId);
  await loadConversationHistory(userId);
  
  if (activeConnectionElement) {
    activeConnectionElement.classList.remove('active');
  }
  clickedElement.classList.add('active');
  activeConnectionElement = clickedElement;
}

async function loadConversationHistory(userId) {
	  try {
	    const response = await fetch(`http://10.11.177.197:9099/api/messages/conversation/${userId}?page=0&size=50`, {
	      headers: {
	        'Authorization': 'Bearer ' + token,
	        'Content-Type': 'application/json'
	      }
	    });

	    if (response.ok) {
	      const data = await response.json();
	      // Access the payload which contains the array of messages
	      const messages = data.payload || [];
	      displayMessages(messages);
	    } else {
	      document.getElementById('messages').innerHTML = `
	        <div class="empty-state">
	          <div class="empty-state-icon">⚠️</div>
	          <div class="empty-state-title">Failed to load messages</div>
	          <div class="empty-state-text">Please try again</div>
	        </div>
	      `;
	    }
	  } catch (error) {
	    console.error('Error loading conversation:', error);
	    document.getElementById('messages').innerHTML = `
	      <div class="empty-state">
	        <div class="empty-state-icon">⚠️</div>
	        <div class="empty-state-title">Error loading messages</div>
	        <div class="empty-state-text">Please check your connection</div>
	      </div>
	    `;
	  }
	}


function displayMessages(messages) {
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML = '';

  if (!messages || messages.length === 0) {
    messagesDiv.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-title">No messages yet</div>
        <div class="empty-state-text">Start the conversation!</div>
      </div>
    `;
    return;
  }

  const sortedMessages = [...messages].reverse();
  
  sortedMessages.forEach(msg => {
    appendMessage(msg);
  });
}

function incrementUnreadCount(userId) {
  const current = unreadMessages.get(userId) || 0;
  unreadMessages.set(userId, current + 1);
  updateUnreadBadge();
}

function clearUnreadCount(userId) {
  unreadMessages.delete(userId);
  updateUnreadBadge();
  updateConnectionList();
}

function updateUnreadBadge() {
  const totalUnread = Array.from(unreadMessages.values()).reduce((sum, count) => sum + count, 0);
  const badge = document.getElementById('unreadCount');
  if (totalUnread > 0) {
    badge.textContent = totalUnread;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

async function loadUnreadCount() {
	  try {
	    const response = await fetch('http://10.11.177.197:9099/api/messages/unread/count', {
	      headers: {
	        'Authorization': 'Bearer ' + token
	      }
	    });

	    if (response.ok) {
	      const data = await response.json();
	      const count = data.payload || 0; // Access the payload for the actual count

	      if (count > 0) {
	        const unreadElem = document.getElementById('unreadCount');
	        unreadElem.textContent = count;
	        unreadElem.style.display = 'inline-block';
	      }
	    }
	  } catch (error) {
	    console.error('Error loading unread count:', error);
	  }
	}


function updateConnectionList() {
  loadConnections();
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);

document.getElementById('messageInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    sendMessage();
  }
});

document.getElementById('messageInput').addEventListener('input', (e) => {
  if (typingTimer) clearTimeout(typingTimer);
  
  if (e.target.value.trim().length > 0) {
    sendTypingIndicator(true);
  }
  
  typingTimer = setTimeout(() => {
    sendTypingIndicator(false);
  }, 1000);
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  const searchTerm = e.target.value.toLowerCase();
  const connections = document.querySelectorAll('.connection-item');
  
  connections.forEach(conn => {
    const name = conn.querySelector('.connection-name').textContent.toLowerCase();
    const username = conn.querySelector('.connection-username').textContent.toLowerCase();
    
    if (name.includes(searchTerm) || username.includes(searchTerm)) {
      conn.style.display = 'flex';
    } else {
      conn.style.display = 'none';
    }
  });
});

document.getElementById('btnLogout').addEventListener('click', function() {
  if (confirm('Are you sure you want to logout?')) {
    localStorage.removeItem('jwtToken');
    if (stompClient) {
      stompClient.disconnect();
    }
    window.location.reload();
  }
});

document.addEventListener('DOMContentLoaded', function() {
  loadCurrentUser();
  if (me) {
    connectWs();
  }
});
