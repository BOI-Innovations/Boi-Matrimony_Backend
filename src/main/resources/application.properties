spring.application.name=matrimony-app

# Server Configuration
server.port=9099

# Spring Profiles
spring.profiles.active=dev

# Database Configuration (Development)
spring.datasource.url=jdbc:mysql://localhost:3306/matrimony_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=BOI#BM$Portal#2026

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
matrimony.app.jwtSecret=matrimonySecretKeyForJWTSigning2024SecureApplication
matrimony.app.jwtExpirationMs=86400000
matrimony.app.jwtRefreshExpirationMs=604800000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=onlinetutor4200@gmail.com
spring.mail.password=jsgl gpxw dlmx wbrb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
#debug=true
# Logging Configuration
#logging.level.com.matrimony=DEBUG
#logging.level.org.springframework.web=INFO
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:4200
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true


# Application Specific
matrimony.upload.dir=./uploads/
matrimony.profile.completion.threshold=80
matrimony.max.interests.per.day=50
matrimony.max.messages.per.day=100	

# Absolute path outside Tomcat for storing uploads
profile.picture.upload-dir=D:/appdata/uploads/profile-pictures

# Directory for storing banner images
ads.media.upload-dir=D:/appdata/uploads/banner-images


# Websocket origin (adjust)
app.websocket.allowed-origins=*

